
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hopper Note</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: https:; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; frame-src https:;">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <aside id="entries-sidebar">
      <div class="sidebar-top">
        <h1>Hopper Note</h1>
        <button id="new-entry-btn" type="button">New Entry</button>
        <button id="duplicate-entry-btn" type="button">Duplicate Entry</button>
        <button id="delete-entry-btn" type="button">Delete Entry</button>
      </div>

      <input id="entry-search-input" type="text" placeholder="Search entries..." aria-label="Search entries">

      <div id="entry-list" aria-label="Journal entries"></div>

      <section id="tags-panel" aria-label="Entry tags">
        <button id="tag-overlay-open" type="button">
          <span>Tags / Filters</span>
          <span id="tag-filter-count">0 tags</span>
        </button>
      </section>
    </aside>

    <main id="editor-shell">
      <div id="editor-topbar">
        <input id="entry-title-input" type="text" placeholder="Untitled entry" aria-label="Entry title">
        <div id="meta-row">
          <div id="entry-date-label">No entry selected</div>
          <div id="save-status">Saved</div>
        </div>
      </div>

      <div id="toolbar">
        <button class="tool-btn" data-command="bold" type="button"><strong>B</strong></button>
        <button class="tool-btn" data-command="italic" type="button"><em>I</em></button>
        <button class="tool-btn" data-action="h2" type="button">H2</button>
        <button class="tool-btn" data-action="ul" type="button">• List</button>
        <button class="tool-btn" data-action="quote" type="button">“ Quote</button>
        <button class="tool-btn" id="insert-image-btn" type="button">Image</button>
        <button class="tool-btn" id="insert-video-btn" type="button">Video</button>
        <button class="tool-btn" id="insert-highlight-btn" type="button">Highlight</button>
        <button class="tool-btn" id="clear-format-btn" type="button">Clear</button>
        <button class="tool-btn primary-btn" id="import-entry-btn" type="button">Import Entry</button>
        <button class="tool-btn primary-btn" id="export-entry-btn" type="button">Export Entry</button>
      </div>

      <div id="editor-wrap">
        <div id="editor" contenteditable="true" spellcheck="true" aria-label="Journal editor"></div>
      </div>
    </main>

    <aside id="highlights-sidebar">
      <div class="sidebar-top">
        <h2>Highlights Library</h2>
        <button id="import-csv-btn" type="button">Import CSV</button>
        <button id="export-csv-btn" type="button">Export CSV</button>
      </div>

      <input id="highlight-search-input" type="text" placeholder="Search highlights..." aria-label="Search highlights">

      <div id="highlight-list" aria-label="Imported highlights"></div>
    </aside>
  </div>

  <input id="image-input" type="file" accept="image/*" multiple hidden>
  <input id="entry-html-input" type="file" accept=".html,.htm,text/html" hidden>
  <div id="modal-root"></div>
  <div id="tag-overlay-backdrop" class="tag-overlay-backdrop" hidden>
    <section id="tag-overlay-card" aria-label="Tag filters">
      <div id="tag-overlay-header">
        <div>
          <h2>Tags / Filters</h2>
          <p>Filters from inserted highlight tags</p>
        </div>
        <button id="tag-overlay-close" type="button" aria-label="Close tag filters">×</button>
      </div>
      <div id="tag-overlay-controls">
        <button id="tag-delete-mode-btn" type="button">X Mode</button>
      </div>
      <div id="tag-list"></div>
    </section>
  </div>
  <div id="aria-live" class="visually-hidden" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
